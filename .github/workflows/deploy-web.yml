name: Deploy Web Frontend

on:
  push:
    branches:
      - main
      - claude/create-wasm-branch-dhzVw
      - claude/deploy-gh-pages-TrOfP
  workflow_dispatch:

permissions:
  contents: write   # needed to push the gh-pages branch

# Only one deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.73

      - name: Configure (emcmake)
        run: emcmake cmake -S . -B build-web -DMICRONES_PLATFORM=web

      - name: Build WASM
        run: cmake --build build-web -j$(nproc)

      # Push build-web/ to the gh-pages branch.
      # In repo Settings → Pages set source to: branch=gh-pages, folder=/ (root).
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build-web
