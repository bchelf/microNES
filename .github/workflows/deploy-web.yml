name: Deploy Web Frontend

on:
  push:
    branches:
      - main
      - claude/create-wasm-branch-dhzVw
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel in-progress if a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.73   # latest stable at time of writing

      - name: Configure (emcmake)
        run: emcmake cmake -S . -B build-web -DMICRONES_PLATFORM=web

      - name: Build WASM
        run: cmake --build build-web -j$(nproc)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-web/   # contains micrones.js, micrones.wasm, index.html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
